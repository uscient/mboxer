version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"

    open-pull-requests-limit: 5

    labels:
      - "dependencies"
      - "python"

    commit-message:
      prefix: "deps"
      include: "scope"

    groups:
      python-runtime-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

      python-development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
